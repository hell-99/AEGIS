apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-receiver
  namespace: aegis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-receiver
  template:
    metadata:
      labels:
        app: aegis-receiver
    spec:
      containers:
      - name: aegis-receiver
        image: aegis-receiver:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-receiver-service
  namespace: aegis
spec:
  selector:
    app: aegis-receiver
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
  type: NodePort
